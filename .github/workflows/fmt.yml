name: Format check

on:
  pull_request:
    branches: [main]

concurrency:
  group: fmt-${{ github.head_ref }}
  cancel-in-progress: true

jobs:
  fmt:
    name: cargo fmt
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Check formatting
        run: cargo fmt --all -- --check
