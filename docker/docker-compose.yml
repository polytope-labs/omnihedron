services:
  # ── PostgreSQL 17 ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:17
    container_name: subql-postgres
    environment:
      POSTGRES_DB: indexer
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d indexer"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

  # ── One-shot fixture loader (skips if DB already populated) ─────────────────
  db-init:
    image: postgres:17
    container_name: subql-db-init
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGPASSWORD: postgres
    volumes:
      - ../tests/fixtures/test_db.sql:/tmp/test_db.sql:ro
      - ../tests/fixtures/type_coverage.sql:/tmp/type_coverage.sql:ro
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -e
        COUNT=$$(psql -h postgres -U postgres -d indexer -t -c \
          "SELECT COUNT(*) FROM information_schema.tables \
           WHERE table_schema NOT IN ('public','information_schema','pg_catalog') \
           AND table_schema NOT LIKE 'pg_%';" | tr -d '[:space:]')
        if [ "$${COUNT:-0}" -gt "0" ]; then
          echo "==> DB already loaded ($$COUNT tables). Skipping."
        else
          echo "==> Loading fixture data..."
          psql -h postgres -U postgres -d indexer -f /tmp/test_db.sql
          psql -h postgres -U postgres -d indexer -f /tmp/type_coverage.sql
          echo "==> Fixture loaded."
        fi
    restart: "no"

  # ── TypeScript @subql/query ───────────────────────────────────────────────────
  subql-query-ts:
    image: subquerynetwork/subql-query:latest
    container_name: subql-query-ts
    depends_on:
      db-init:
        condition: service_completed_successfully
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: postgres
      DB_PASS: postgres
      DB_DATABASE: indexer
    ports:
      - "3001:3001"
    command: ["--name", "${SCHEMA_NAME:-app}", "--port", "3001", "--unsafe"]
    restart: unless-stopped

  # ── Rust omnihedron ───────────────────────────────────────────────────────────
  omnihedron:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: omnihedron:latest
    container_name: omnihedron
    depends_on:
      db-init:
        condition: service_completed_successfully
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: postgres
      DB_PASS: postgres
      DB_DATABASE: indexer
      OMNIHEDRON_LOG_LEVEL: debug
    ports:
      - "3000:3000"
    command: ["--name", "${SCHEMA_NAME:-app}", "--port", "3000", "--unsafe-mode"]
    restart: unless-stopped

volumes:
  postgres_data:
    name: subql_postgres_data
