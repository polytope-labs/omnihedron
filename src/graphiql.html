<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="robots" content="noindex">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="referrer" content="origin">
    <title>GraphiQL IDE</title>
    <style>
      body { height: 100%; margin: 0; width: 100%; overflow: hidden; }
      #graphiql { height: 100vh; }
    </style>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <link rel="icon" href="https://graphql.org/favicon.ico">
    <link rel="stylesheet" href="https://unpkg.com/graphiql@4/graphiql.min.css" />
    <link rel="stylesheet" href="https://unpkg.com/@graphiql/plugin-explorer@4/dist/style.css" />
  </head>
  <body>
    <div id="graphiql">Loading...</div>
    <script src="https://unpkg.com/graphiql@4/graphiql.min.js" type="application/javascript"></script>
    <script src="https://unpkg.com/@graphiql/plugin-explorer@4/dist/index.umd.js" crossorigin></script>
    <script>
      const url = new URL('/', window.location.origin).toString();
      const fetcher = (graphQLParams, opts) =>
        fetch(url, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', ...opts?.headers },
          body: JSON.stringify(graphQLParams),
          credentials: 'same-origin',
        }).then(r => r.json());
      const explorer = GraphiQLPluginExplorer.explorerPlugin();
      ReactDOM.createRoot(document.getElementById('graphiql')).render(
        React.createElement(GraphiQL, {
          fetcher,
          defaultEditorToolsVisibility: true,
          plugins: [explorer],
        })
      );
    </script>
  </body>
</html>
